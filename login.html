<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeCinema - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="login-card">
        <div class="logo" style="text-align: center; border: none; font-size: 3rem;">VibeCinema</div>
        <h2 style="text-align: center; color: #fff; margin-bottom: 30px;">Sign In</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="ali_dev" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="post-btn">SIGN IN</button>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
